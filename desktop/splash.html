<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>TradeAI</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        color: #131722;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }
      .brand {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .hint {
        font-size: 13px;
        color: #8f8f8f;
      }
      .bar {
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: #e0e3eb;
        overflow: hidden;
      }
      .bar::before {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: #2962ff;
        border-radius: 999px;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">TradeAI</div>
      <div class="bar"></div>
      <div class="hint">正在启动本地服务…</div>
    </div>
  </body>
</html>
