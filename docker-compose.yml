# 个人股票分析平台 — Docker Compose 编排
# 本地一键启动：docker compose up -d
# 前端 http://localhost:3000 ，后端 http://localhost:8000

services:
  backend:
    build: ./backend
    container_name: tradeai-backend
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化到宿主机 data 目录（SQLite 库 + 备份 + 导出）
      - ./data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BASE_CURRENCY=JPY
      - DATABASE_URL=sqlite:////app/data/stock.db
      - TZ=Asia/Tokyo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: tradeai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
